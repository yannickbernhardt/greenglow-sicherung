<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sicherung · GreenGlow Ablauforganisation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#f3f6f1; --bg-2:#eaf0e7;
    --surface:#ffffff; --surface-2:#f7faf5;
    --ink:#16241c; --ink-2:#3d4f44; --ink-3:#6b7d70;
    --line:#e3ebe0; --line-2:#d2ddce;
    --brand:#1f7a4d; --brand-deep:#155c39; --brand-bright:#45b57a;
    --brand-tint:#e9f3ec; --brand-tint-2:#dcecdf;
    --r1:#4f9d6a; --r2:#d29327; --r3:#cf5a3f;
    --r1-tint:#e9f4ec; --r2-tint:#faf1de; --r3-tint:#faeae5;
    --amber:#c9821c; --amber-tint:#fbf2df;
    --shadow-sm:0 1px 2px rgba(20,50,32,.05),0 2px 4px rgba(20,50,32,.05);
    --shadow-md:0 6px 18px -6px rgba(20,50,32,.14),0 2px 6px rgba(20,50,32,.05);
    --shadow-lg:0 24px 50px -18px rgba(20,50,32,.24);
    --z-nav:40; --z-toast:60;
    --e-out:cubic-bezier(.22,.68,.32,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{
    background:
      radial-gradient(1100px 620px at 82% -8%, #eef5ea 0%, rgba(238,245,234,0) 60%),
      radial-gradient(900px 500px at 0% 100%, #edf3e8 0%, rgba(237,243,232,0) 55%),
      var(--bg);
    color:var(--ink);
    font-family:Inter,system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100vh;
  }
  input,textarea,button,select{font-family:inherit;color:inherit}
  input:focus-visible,textarea:focus-visible,select:focus-visible,button:focus-visible{
    outline:2.5px solid var(--brand); outline-offset:2px;
  }
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px;border:2px solid var(--bg)}
  ::selection{background:var(--brand-tint-2)}
  details summary{list-style:none}
  details summary::-webkit-details-marker{display:none}

  /* ---- typographic primitives ---- */
  .display{font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;letter-spacing:-.01em;line-height:1.06;text-wrap:balance}
  .h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;font-size:clamp(1.7rem,1.3rem+1.6vw,2.15rem);line-height:1.1;color:var(--ink);margin:0 0 10px;letter-spacing:-.01em;text-wrap:balance}
  .lede{margin:0;font-size:15px;line-height:1.6;color:var(--ink-2)}
  .hint{margin:14px 0 0;font-size:12.5px;line-height:1.5;color:var(--ink-3)}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);font-weight:600}
  /* Cormorant defaults to oldstyle figures (1→I, 0→O); force lining+tabular for all numeric display */
  .display,.h1,.brand-title,.t-title,.panel-num,.panel-label,.ifrow .votes,.avg .v,.count-pill .n{font-feature-settings:"lnum" 1,"tnum" 1}

  /* ---- layout ---- */
  .wrap{max-width:620px;margin:0 auto;padding:26px 18px 132px}
  .stepwrap{animation:rise .42s var(--e-out) both}

  /* ---- topbar ---- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding-bottom:18px}
  .brandline{display:flex;align-items:center;gap:12px}
  .leafmark{width:38px;height:38px;flex-shrink:0;color:var(--brand);filter:drop-shadow(0 3px 6px rgba(31,122,77,.24))}
  .brand-title{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:700;color:var(--ink);line-height:1}
  .brand-title .dot{color:var(--brand-bright)}
  .brand-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin-top:4px;font-weight:600}
  .team-badge{text-align:right;flex-shrink:0;max-width:44%}
  .team-badge .k{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .team-badge .v{font-weight:600;font-size:13px;color:var(--brand-deep);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ---- progress ---- */
  .steps{display:flex;gap:7px;margin-bottom:6px}
  .steps .seg{flex:1;height:5px;border-radius:99px;background:var(--line);overflow:hidden;position:relative}
  .steps .seg > i{position:absolute;inset:0;background:linear-gradient(90deg,var(--brand),var(--brand-bright));transform-origin:left;transform:scaleX(0);transition:transform .5s var(--e-out)}
  .steps .seg.on > i{transform:scaleX(1)}
  .steplabel{font-size:11px;color:var(--ink-3);letter-spacing:.02em;margin-top:9px;font-weight:500}
  .steplabel b{color:var(--brand-deep);font-weight:600}

  /* ---- card / surfaces ---- */
  .card{position:relative;padding:26px 24px;background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-md)}
  .card.pad-lg{padding:30px 26px}

  /* ---- fields ---- */
  .field{width:100%;padding:14px 16px;font-size:16px;background:var(--surface-2);border:1.5px solid var(--line-2);border-radius:13px;color:var(--ink);transition:border-color .18s,background .18s,box-shadow .18s}
  .field::placeholder{color:#9aa89d}
  .field:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px var(--brand-tint)}
  textarea.field{resize:vertical;line-height:1.55;min-height:96px}
  select.field{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%231f7a4d' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:44px}

  /* ---- rating stations ---- */
  .fillbar{margin-top:14px;font-size:12px;color:var(--ink-3);display:flex;justify-content:space-between;align-items:center}
  .fillbar .done{color:var(--brand);display:inline-flex;align-items:center;gap:5px;font-weight:600}
  .stations{margin-top:14px;display:flex;flex-direction:column;gap:11px}
  .station{padding:15px 15px 14px;border-radius:15px;background:var(--surface-2);border:1.5px solid var(--line);transition:border-color .2s,box-shadow .2s,transform .2s;animation:rise .5s var(--e-out) both}
  .station.rated{border-color:var(--brand-tint-2);box-shadow:var(--shadow-sm)}
  .station-head{display:flex;align-items:flex-start;gap:12px}
  .station-num{flex-shrink:0;width:28px;height:28px;border-radius:9px;background:var(--brand-tint);color:var(--brand-deep);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-variant-numeric:tabular-nums}
  .station-name{font-weight:600;font-size:14.5px;color:var(--ink)}
  .station-dept{font-size:11.5px;color:var(--ink-3);margin-top:2px}
  .rating{display:flex;gap:8px;margin-top:12px}
  .rbtn{flex:1;padding:9px 0 8px;border-radius:11px;cursor:pointer;border:1.5px solid var(--line-2);background:#fff;color:var(--ink-3);display:flex;flex-direction:column;align-items:center;gap:1px;transition:transform .14s var(--e-out),border-color .16s,background .16s,color .16s}
  .rbtn .n{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
  .rbtn .t{font-size:9.5px;font-weight:600;letter-spacing:.02em}
  .rbtn:active{transform:scale(.94)}
  .rbtn[data-v="1"].on{border-color:var(--r1);background:var(--r1-tint);color:var(--r1)}
  .rbtn[data-v="2"].on{border-color:var(--r2);background:var(--r2-tint);color:var(--amber)}
  .rbtn[data-v="3"].on{border-color:var(--r3);background:var(--r3-tint);color:var(--r3)}
  .rbtn.on{transform:translateY(-1px)}

  /* ---- interfaces ---- */
  .iface{margin-top:15px;padding:16px;border-radius:15px;background:var(--amber-tint);border:1.5px solid #efdcb0}
  .iface-label{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:11px;color:var(--amber);letter-spacing:.09em;text-transform:uppercase;margin-bottom:11px}
  .iface-label .pin{width:18px;height:18px;border-radius:6px;background:var(--amber);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-variant-numeric:tabular-nums}
  .iface .field{background:#fff;border-color:#eddcb6}
  .iface .field:focus{border-color:var(--amber);box-shadow:0 0 0 4px #f6e6c2}
  .iface select.field{margin-bottom:11px}

  /* ---- navbar ---- */
  .navbar{position:fixed;bottom:0;left:0;right:0;z-index:var(--z-nav);padding:26px 18px 22px;background:linear-gradient(to top,var(--bg) 62%,rgba(243,246,241,0));pointer-events:none}
  .navbar-inner{max-width:620px;margin:0 auto;display:flex;gap:10px;pointer-events:auto}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 22px;border-radius:13px;font-weight:600;font-size:15px;cursor:pointer;border:none;transition:transform .15s var(--e-out),box-shadow .2s,background .2s,opacity .2s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{flex:1;background:linear-gradient(135deg,var(--brand),var(--brand-deep));color:#f4faf5;box-shadow:0 10px 24px -8px rgba(21,92,57,.6),inset 0 1px 0 rgba(255,255,255,.16)}
  .btn-primary:hover{box-shadow:0 14px 30px -8px rgba(21,92,57,.7),inset 0 1px 0 rgba(255,255,255,.2)}
  .btn-primary[disabled]{opacity:.42;cursor:not-allowed;box-shadow:none}
  .btn-ghost{background:#fff;border:1.5px solid var(--line-2);color:var(--ink-2);box-shadow:var(--shadow-sm)}
  .btn-ghost:hover{border-color:var(--brand);color:var(--brand-deep)}
  .toast-err{max-width:620px;margin:12px auto 0;padding:11px 14px;background:var(--r3-tint);border:1.5px solid #eec2b6;border-radius:12px;color:#a8452f;font-size:13px;text-align:center;pointer-events:auto}

  /* ---- success ---- */
  .success{text-align:center;padding:8px 0 4px}
  .success-badge{position:relative;width:88px;height:88px;margin:6px auto 0;border-radius:50%;background:var(--brand-tint);display:flex;align-items:center;justify-content:center;color:var(--brand);animation:pop .5s var(--e-out) both}
  .success-badge::after{content:"";position:absolute;inset:-10px;border-radius:50%;border:2px solid var(--brand-bright);opacity:0;animation:halo 1.6s var(--e-out) .25s infinite}

  /* ---- decorative divider ---- */
  .sprig{position:absolute;top:-10px;right:16px;width:64px;height:64px;color:var(--brand);opacity:.12;pointer-events:none}

  /* ================= TEACHER ================= */
  .t-wrap{max-width:1340px;margin:0 auto;padding:30px 24px 72px}
  .t-header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:18px;margin-bottom:26px;padding-bottom:20px;border-bottom:1px solid var(--line-2)}
  .t-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,1.4rem+2vw,2.7rem);font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.015em}
  .t-title .dot{color:var(--brand-bright)}
  .t-sub{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);margin-top:8px;font-weight:600}
  .t-tools{display:flex;gap:12px;align-items:center}
  .count-pill{display:flex;align-items:baseline;gap:9px;padding:11px 20px;border-radius:14px;background:#fff;border:1px solid var(--brand-tint-2);box-shadow:var(--shadow-sm)}
  .count-pill .live{width:8px;height:8px;border-radius:50%;background:var(--brand-bright);box-shadow:0 0 0 0 rgba(69,181,122,.6);animation:pulse 2s infinite;align-self:center}
  .count-pill .n{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--brand-deep);line-height:1;font-variant-numeric:tabular-nums}
  .count-pill .l{font-size:12px;color:var(--ink-3)}
  .btn-danger{padding:11px 18px;border-radius:13px;background:#fff;border:1.5px solid #eac6ba;color:#b1492f;font-weight:600;font-size:14px;cursor:pointer;transition:background .18s,border-color .18s}
  .btn-danger:hover{background:var(--r3-tint);border-color:var(--r3)}

  .panel{padding:24px 26px;background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-md);margin-bottom:20px;animation:rise .5s var(--e-out) both}
  .panel-head{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .panel-num{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;color:var(--brand-bright);opacity:.55;line-height:1;font-variant-numeric:tabular-nums}
  .panel-label{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--ink);letter-spacing:-.01em}

  .rrow{display:grid;grid-template-columns:38px 1fr 82px;align-items:center;gap:16px;padding:13px 14px;background:var(--surface-2);border:1px solid var(--line);border-radius:13px}
  .rrow + .rrow{margin-top:9px}
  .rrow .num{width:34px;height:34px;border-radius:9px;background:var(--brand-tint);color:var(--brand-deep);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
  .rrow .name{font-size:14.5px;font-weight:600;color:var(--ink)}
  .stack{margin-top:8px;display:flex;height:14px;border-radius:7px;overflow:hidden;background:var(--line);box-shadow:inset 0 0 0 1px rgba(0,0,0,.02)}
  .stack > span{transition:width .5s var(--e-out)}
  .legend{font-size:11px;color:var(--ink-3);margin-top:6px;display:flex;gap:15px;flex-wrap:wrap}
  .legend .d{display:inline-flex;align-items:center;gap:5px;font-variant-numeric:tabular-nums}
  .legend .d i{width:8px;height:8px;border-radius:50%}
  .avg{text-align:right}
  .avg .v{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .avg .l{font-size:10px;color:var(--ink-3);margin-top:3px;letter-spacing:.08em;text-transform:uppercase}

  .ifrow{padding:14px 18px;background:var(--surface-2);border:1px solid var(--line);border-radius:13px}
  .ifrow + .ifrow{margin-top:9px}
  .ifrow.hot{border-color:#eecf94;background:var(--amber-tint)}
  .ifrow summary{cursor:pointer;display:flex;align-items:center;gap:15px}
  .ifrow .votes{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;min-width:40px;text-align:center;line-height:1;color:var(--ink-3);font-variant-numeric:tabular-nums}
  .ifrow.hot .votes{color:var(--amber)}
  .ifrow .ititle{font-size:14.5px;font-weight:600;color:var(--ink)}
  .ifrow .inote{font-size:11.5px;color:var(--ink-3);margin-top:2px}
  .ifrow .track{width:150px;height:10px;border-radius:6px;background:var(--line);overflow:hidden;flex-shrink:0}
  .ifrow .track > i{display:block;height:100%;background:linear-gradient(90deg,var(--r2),var(--amber));transition:width .5s var(--e-out)}
  .reasons{margin-top:13px;padding-left:55px;display:flex;flex-direction:column;gap:9px}
  .reason{padding:11px 14px;background:#fff;border:1px solid #efdcb0;border-radius:11px;font-size:13px;line-height:1.55;color:var(--ink-2)}
  .reason .who{font-size:10px;color:var(--amber);letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-bottom:4px}

  .opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px}
  .opt-card{padding:18px 19px;background:linear-gradient(162deg,var(--brand-tint),#fff 88%);border:1px solid var(--brand-tint-2);border-radius:15px;box-shadow:var(--shadow-sm)}
  .opt-card .who{font-size:10.5px;color:var(--brand-deep);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .opt-card .who i{width:6px;height:6px;border-radius:50%;background:var(--brand-bright)}
  .opt-card .body{font-size:13.5px;line-height:1.6;color:var(--ink);white-space:pre-wrap}

  .msg{text-align:center;padding:76px 20px;color:var(--ink-3);font-size:15px}
  .msg .big{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--ink-2);margin-bottom:8px}
  .login{max-width:410px;margin:78px auto;padding:34px 30px;background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg)}

  /* ---- motion ---- */
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes halo{0%{transform:scale(.9);opacity:.5}100%{transform:scale(1.35);opacity:0}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(69,181,122,.55)}70%{box-shadow:0 0 0 8px rgba(69,181,122,0)}100%{box-shadow:0 0 0 0 rgba(69,181,122,0)}}

  @media (max-width:520px){
    .wrap{padding:20px 14px 128px}
    .card{padding:22px 18px}
    .rbtn .t{font-size:9px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important}
    .stepwrap,.station,.panel{animation:none}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/jsx-app" id="app-src">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ========== CONFIG ========== */
const TOPIC = 'greenglow-sich-hbg11a-r7k3n';
const NTFY = 'https://ntfy.sh/' + TOPIC;
const TEACHER_PW = 'engpass';

/* ========== DATA ========== */
const STATIONS = [
  { num:1, name:"Bestelleingang", dept:"Vertrieb & Kundenservice" },
  { num:2, name:"Bestand prüfen", dept:"Einkauf & Logistik" },
  { num:3, name:"Vorrätig? (Verzweigung)", dept:"Einkauf & Logistik" },
  { num:4, name:"Rechnung & Kommissionierung", dept:"Finanzen + Logistik" },
  { num:5, name:"Qualität & Verpacken", dept:"Produktion + Logistik" },
  { num:6, name:"Versand", dept:"Einkauf & Logistik" },

];

const PAIRS = [
  { id:'p12', from:1, to:2, note:'Vertrieb → Logistik', critical:true },
  { id:'p23', from:2, to:3, note:'innerhalb Logistik', critical:false },
  { id:'p34', from:3, to:4, note:'Logistik → Finanzen', critical:true },
  { id:'p45', from:4, to:5, note:'Finanzen → Produktion', critical:true },
  { id:'p56', from:5, to:6, note:'zurück in Logistik', critical:false },
  { id:'p67', from:6, to:7, note:'Logistik → Vertrieb', critical:true }
];

const RC   = { 1:'#4f9d6a', 2:'#d29327', 3:'#cf5a3f' };
const RLABEL = { 1:'unkritisch', 2:'aufpassen', 3:'riskant' };
const STEP_NAMES = ['Team', 'Stationen bewerten', 'Schnittstellen', 'Optimierung'];

/* ========== ICONS ========== */
const Svg = ({size=20, sw=2, children, style}) =>
  <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}>{children}</svg>;
const CheckIcon = p => <Svg {...p}><path d="M20 6L9 17l-5-5"/></Svg>;
const ArrowIcon = p => <Svg {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Svg>;
const BackIcon = p => <Svg {...p}><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></Svg>;
const SendIcon = p => <Svg {...p}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></Svg>;
const RefreshIcon = p => <Svg {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Svg>;
const PinIcon = p => <Svg {...p}><path d="M12 21s-7-5.686-7-11a7 7 0 0 1 14 0c0 5.314-7 11-7 11Z"/><circle cx="12" cy="10" r="2.4"/></Svg>;
const UsersIcon = p => <Svg {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Svg>;
const Leaf = ({className}) =>
  <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
    <path d="M2 21c0-3 1.85-5.36 5.08-6"/>
  </svg>;

/* ========== ROUTING ========== */
function getRoute() {
  const h = window.location.hash.slice(1);
  const [path, qs] = h.split('?');
  return { path: path || '', params: new URLSearchParams(qs || '') };
}

/* ========== APP ========== */
function App() {
  const [route, setRoute] = useState(getRoute());
  useEffect(() => {
    const h = () => setRoute(getRoute());
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  if (route.path === 'lehrer') return <TeacherView route={route}/>;
  return <StudentApp/>;
}

/* ========== STUDENT APP ========== */
function defaultState() {
  return { teamName:'', ratings:{}, interfaces:[{pairId:'',reason:''},{pairId:'',reason:''}], optimization:'', submitted:false, teamId:null };
}
function validate(s, step) {
  if (step === 0) return s.teamName.trim().length >= 2;
  if (step === 1) return STATIONS.every(st => s.ratings[st.num] >= 1 && s.ratings[st.num] <= 3);
  if (step === 2) return s.interfaces[0].pairId && s.interfaces[0].reason.trim().length >= 3
                     && s.interfaces[1].pairId && s.interfaces[1].reason.trim().length >= 3
                     && s.interfaces[0].pairId !== s.interfaces[1].pairId;
  if (step === 3) return s.optimization.trim().length >= 10;
  return false;
}

function StudentApp() {
  const [state, setState] = useState(() => {
    try { return JSON.parse(localStorage.getItem('gg_sich') || 'null') || defaultState(); }
    catch { return defaultState(); }
  });
  const [step, setStep] = useState(state.submitted ? 4 : 0);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => { localStorage.setItem('gg_sich', JSON.stringify(state)); }, [state]);

  const update = patch => setState(s => ({ ...s, ...patch }));

  const submit = async () => {
    setSubmitting(true); setError(null);
    try {
      const teamId = state.teamId || Math.random().toString(36).slice(2, 10);
      const payload = {
        teamId,
        teamName: state.teamName.trim(),
        ratings: state.ratings,
        interfaces: state.interfaces,
        optimization: state.optimization.trim(),
        timestamp: Date.now()
      };
      const res = await fetch(NTFY, { method:'POST', body: JSON.stringify(payload) });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      setState(s => ({ ...s, teamId, submitted:true }));
      setStep(4);
      window.scrollTo({top:0, behavior:'smooth'});
    } catch(e) { setError(e.message || String(e)); }
    setSubmitting(false);
  };

  const restart = () => {
    localStorage.removeItem('gg_sich');
    setState(defaultState()); setStep(0);
  };

  const canProceed = validate(state, step);

  return <div className="wrap">
    <TopBar step={step} teamName={state.teamName}/>
    {step < 4 && <Progress step={step}/>}
    <div className="stepwrap" key={step} style={{marginTop:18}}>
      {step === 0 && <TeamStep name={state.teamName} onChange={n => update({teamName:n})}/>}
      {step === 1 && <RatingStep ratings={state.ratings} onChange={r => update({ratings:r})}/>}
      {step === 2 && <InterfacesStep values={state.interfaces} onChange={i => update({interfaces:i})}/>}
      {step === 3 && <OptStep value={state.optimization} onChange={v => update({optimization:v})}/>}
      {step === 4 && <SuccessScreen teamName={state.teamName} onRestart={restart}/>}
    </div>
    {step < 4 && <NavBar step={step} canProceed={canProceed} submitting={submitting} error={error}
      onBack={() => setStep(s => Math.max(0, s-1))}
      onNext={() => { setStep(s => s+1); window.scrollTo({top:0, behavior:'smooth'}); }}
      onSubmit={submit}/>}
  </div>;
}

function TopBar({step, teamName}) {
  return <div className="topbar">
    <div className="brandline">
      <Leaf className="leafmark"/>
      <div>
        <div className="brand-title">Sicherung <span className="dot">·</span> GreenGlow</div>
        <div className="brand-sub">Ablauforganisation</div>
      </div>
    </div>
    {teamName && step > 0 && step < 4 &&
      <div className="team-badge"><div className="k">Team</div><div className="v">{teamName}</div></div>}
  </div>;
}

function Progress({step}) {
  return <div>
    <div className="steps">
      {[0,1,2,3].map(i => <div key={i} className={'seg' + (i <= step ? ' on' : '')}><i/></div>)}
    </div>
    <div className="steplabel">Schritt <b>{step+1}</b> von 4 · {STEP_NAMES[step]}</div>
  </div>;
}

function TeamStep({name, onChange}) {
  return <div className="card pad-lg">
    <Leaf className="sprig"/>
    <h1 className="h1">Willkommen 👋</h1>
    <p className="lede">Bevor's losgeht — wie heißt euer Team? Wenn du allein arbeitest, trag einfach deinen Namen ein.</p>
    <input className="field" type="text" value={name} onChange={e => onChange(e.target.value)} placeholder="z. B. Team Alpha oder Yannick" autoFocus maxLength={40} style={{marginTop:16}}/>
    <p className="hint">Alles anonym — kein Konto, kein Login. Nur der Team-Name ist für dich und die Klasse sichtbar.</p>
  </div>;
}

function RatingStep({ratings, onChange}) {
  const set = (num, val) => onChange({ ...ratings, [num]:val });
  const filled = STATIONS.filter(s => ratings[s.num] >= 1).length;
  return <div className="card">
    <h1 className="h1">Aufgabe 1 · Bewertet die Stationen</h1>
    <p className="lede">Vergebt für jede Station 1–3 Punkte: <b style={{color:RC[1]}}>1 = unkritisch</b>, <b style={{color:RC[2]}}>2 = aufpassen</b>, <b style={{color:RC[3]}}>3 = hochriskant</b>.</p>
    <div className="fillbar">
      <span>{filled} / 7 bewertet</span>
      {filled === 7 && <span className="done"><CheckIcon size={13}/> vollständig</span>}
    </div>
    <div className="stations">
      {STATIONS.map((st, i) =>
        <div key={st.num} className={'station' + (ratings[st.num] ? ' rated' : '')} style={{animationDelay:(i*45)+'ms'}}>
          <div className="station-head">
            <span className="station-num">{st.num}</span>
            <div style={{flex:1, minWidth:0}}>
              <div className="station-name">{st.name}</div>
              <div className="station-dept">{st.dept}</div>
            </div>
          </div>
          <div className="rating">
            {[1,2,3].map(v =>
              <button key={v} data-v={v} className={'rbtn' + (ratings[st.num] === v ? ' on' : '')} onClick={() => set(st.num, v)}>
                <span className="n">{v}</span><span className="t">{RLABEL[v]}</span>
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  </div>;
}

function InterfacesStep({values, onChange}) {
  const set = (i, patch) => onChange(values.map((v, j) => i === j ? { ...v, ...patch } : v));
  return <div className="card">
    <h1 className="h1">Aufgabe 2 · Die zwei kritischsten Schnittstellen</h1>
    <p className="lede">Wählt aus dem Prozess die zwei Übergänge, an denen es am ehesten schiefgehen kann. Meist sind das Wechsel zwischen zwei Abteilungen.</p>
    {[0, 1].map(i =>
      <div key={i} className="iface">
        <div className="iface-label"><span className="pin">{i+1}</span> Schnittstelle {i+1}</div>
        <select className="field" value={values[i].pairId} onChange={e => set(i, {pairId:e.target.value})}>
          <option value="">– Übergang wählen –</option>
          {PAIRS.filter(p => i === 1 ? p.id !== values[0].pairId : true).map(p =>
            <option key={p.id} value={p.id}>Station {p.from} → {p.to} · {p.note}</option>
          )}
        </select>
        <textarea className="field" value={values[i].reason} onChange={e => set(i, {reason:e.target.value})} rows={3} placeholder="Warum ist gerade dieser Übergang kritisch?"/>
      </div>
    )}
  </div>;
}

function OptStep({value, onChange}) {
  return <div className="card">
    <h1 className="h1">Aufgabe 3 · Euer Optimierungsvorschlag</h1>
    <p className="lede">Was würdet ihr Manuela konkret empfehlen, um eine dieser Schnittstellen zu entschärfen? Möglichst konkret — wer soll was tun?</p>
    <textarea className="field" value={value} onChange={e => onChange(e.target.value)} rows={6} placeholder="Beispiel: Bei GreenGlow sollte Yusuf am Ende jedes Tages eine kurze Übergabe-Notiz an Hannah senden, damit …" style={{marginTop:16, fontSize:15}}/>
    <p className="hint">Tipp: „Wer? Was? Wann?" — konkrete Vorschläge sind stärker als vage Absichten.</p>
  </div>;
}

function SuccessScreen({teamName, onRestart}) {
  return <div className="card pad-lg">
    <div className="success">
      <div className="success-badge"><CheckIcon size={44} sw={2.6}/></div>
      <h1 className="h1" style={{marginTop:22}}>Danke, {teamName}! 🎉</h1>
      <p className="lede" style={{maxWidth:380, margin:'0 auto'}}>Eure Ergebnisse sind an der Tafel angekommen und werden gleich in der Klasse besprochen.</p>
    </div>
    <button className="btn btn-ghost" onClick={onRestart} style={{width:'100%', marginTop:26}}>
      <RefreshIcon size={16}/> Neu starten (falls doppelt eingegeben)
    </button>
  </div>;
}

function NavBar({step, canProceed, submitting, error, onBack, onNext, onSubmit}) {
  return <div className="navbar">
    <div className="navbar-inner">
      {step > 0 && <button className="btn btn-ghost" onClick={onBack}><BackIcon size={16}/> Zurück</button>}
      {step < 3 && <button className="btn btn-primary" onClick={onNext} disabled={!canProceed}>Weiter <ArrowIcon size={16}/></button>}
      {step === 3 && <button className="btn btn-primary" onClick={onSubmit} disabled={!canProceed || submitting}>
        {submitting ? 'Sende …' : <>Absenden <SendIcon size={16}/></>}
      </button>}
    </div>
    {error && <div className="toast-err">Konnte nicht senden ({error}). Nochmal versuchen?</div>}
  </div>;
}

/* ========== TEACHER VIEW ========== */
function TeacherView({route}) {
  const urlPw = route.params.get('pw') || '';
  const [password, setPassword] = useState(urlPw);
  const [authed, setAuthed] = useState(urlPw === TEACHER_PW);
  const [data, setData] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!authed) return;
    const clearedBefore = parseInt(localStorage.getItem('teacher_cleared_before') || '0', 10);
    const buffer = new Map();
    const process = (payloadStr) => {
      try {
        const p = JSON.parse(payloadStr);
        if (p.timestamp < clearedBefore) return;
        const existing = buffer.get(p.teamId);
        if (!existing || existing.timestamp < p.timestamp) buffer.set(p.teamId, p);
        const obj = {};
        buffer.forEach((v, k) => obj[k] = v);
        setData(obj);
      } catch(e) {}
    };
    fetch(NTFY + '/json?poll=1&since=all')
      .then(r => r.text())
      .then(text => {
        text.split('\n').filter(l => l.trim()).forEach(line => {
          try {
            const m = JSON.parse(line);
            if (m.event === 'message' && m.message) process(m.message);
          } catch(e) {}
        });
        setLoading(false);
      })
      .catch(() => setLoading(false));
    const es = new EventSource(NTFY + '/sse');
    es.onmessage = ev => {
      try {
        const m = JSON.parse(ev.data);
        if (m.event === 'message' && m.message) process(m.message);
      } catch(e) {}
    };
    return () => es.close();
  }, [authed]);

  if (!authed) return <TeacherLogin password={password} setPassword={setPassword} onLogin={() => setAuthed(password === TEACHER_PW)}/>;

  const submissions = Object.entries(data).map(([id, d]) => ({id, ...d}));
  submissions.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));

  return <div className="t-wrap">
    <TeacherHeader count={submissions.length} onReset={() => {
      if (confirm('Alle bisherigen Eingaben ausblenden? (Zurücksetzen des Klassen-Dashboards für die nächste Runde.)')) {
        localStorage.setItem('teacher_cleared_before', String(Date.now()));
        setData({});
      }
    }}/>
    {loading && <div className="msg">Lade …</div>}
    {!loading && submissions.length === 0 && <div className="msg"><div className="big">Noch keine Eingaben</div>Sobald die SuS absenden, erscheinen sie hier live.</div>}
    {!loading && submissions.length > 0 && <>
      <RatingsPanel submissions={submissions}/>
      <InterfacesPanel submissions={submissions}/>
      <OptimizationsPanel submissions={submissions}/>
    </>}
  </div>;
}

function TeacherLogin({password, setPassword, onLogin}) {
  return <div className="login">
    <Leaf className="leafmark" style={{marginBottom:14}}/>
    <h1 className="h1">Lehrer-Ansicht</h1>
    <p className="lede">Passwort eingeben, um das Klassen-Dashboard zu öffnen.</p>
    <input className="field" type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && onLogin()} autoFocus placeholder="Passwort" style={{marginTop:16}}/>
    <button className="btn btn-primary" onClick={onLogin} style={{width:'100%', marginTop:14}}>Öffnen</button>
  </div>;
}

function TeacherHeader({count, onReset}) {
  return <div className="t-header">
    <div>
      <div className="t-title">Klassen-Auswertung <span className="dot">·</span> GreenGlow</div>
      <div className="t-sub">Ablauforganisation · HBG 11A</div>
    </div>
    <div className="t-tools">
      <div className="count-pill">
        <span className="live"/>
        <span className="n">{count}</span>
        <span className="l">{count === 1 ? 'Team' : 'Teams'}</span>
      </div>
      <button className="btn-danger" onClick={onReset}>Alle löschen</button>
    </div>
  </div>;
}

function RatingsPanel({submissions}) {
  return <div className="panel">
    <div className="panel-head"><span className="panel-num">1</span><div className="panel-label">Bewertung pro Station</div></div>
    <div style={{marginTop:16}}>
      {STATIONS.map(st => {
        const counts = {1:0, 2:0, 3:0};
        submissions.forEach(s => { const r = s.ratings && s.ratings[st.num]; if (r>=1 && r<=3) counts[r]++; });
        const total = counts[1]+counts[2]+counts[3];
        const avg = total > 0 ? ((counts[1]+counts[2]*2+counts[3]*3)/total) : null;
        const avgColor = avg === null ? 'var(--ink-3)' : avg > 2 ? RC[3] : avg > 1.5 ? RC[2] : RC[1];
        return <div key={st.num} className="rrow">
          <span className="num">{st.num}</span>
          <div>
            <div className="name">{st.name}</div>
            <div className="stack">
              {[1,2,3].map(v => { const pct = total ? (counts[v]/total*100) : 0;
                return <span key={v} title={counts[v]+'× '+v+' Pkt'} style={{width:pct+'%', background:RC[v]}}/>; })}
            </div>
            <div className="legend">
              <span className="d" style={{color:RC[1]}}><i style={{background:RC[1]}}/>{counts[1]}× 1</span>
              <span className="d" style={{color:RC[2]}}><i style={{background:RC[2]}}/>{counts[2]}× 2</span>
              <span className="d" style={{color:RC[3]}}><i style={{background:RC[3]}}/>{counts[3]}× 3</span>
            </div>
          </div>
          <div className="avg">
            <div className="v" style={{color:avgColor}}>{avg === null ? '—' : avg.toFixed(1)}</div>
            <div className="l">Ø-Wert</div>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

function InterfacesPanel({submissions}) {
  const counts = {};
  PAIRS.forEach(p => counts[p.id] = { pair:p, count:0, reasons:[] });
  submissions.forEach(s => {
    (s.interfaces || []).forEach(iface => {
      if (iface.pairId && counts[iface.pairId]) {
        counts[iface.pairId].count++;
        if (iface.reason) counts[iface.pairId].reasons.push({ reason:iface.reason, team:s.teamName });
      }
    });
  });
  const maxCount = Math.max(1, ...Object.values(counts).map(c => c.count));
  const sorted = Object.values(counts).sort((a,b) => b.count - a.count);

  return <div className="panel">
    <div className="panel-head"><span className="panel-num">2</span><div className="panel-label">Kritischste Schnittstellen</div></div>
    <div style={{marginTop:16}}>
      {sorted.map(({pair, count, reasons}) =>
        <details key={pair.id} className={'ifrow' + (count > 0 ? ' hot' : '')}>
          <summary style={{cursor: reasons.length ? 'pointer' : 'default'}}>
            <span className="votes">{count}</span>
            <div style={{flex:1, minWidth:0}}>
              <div className="ititle">Station {pair.from} → {pair.to}</div>
              <div className="inote">{pair.note}{pair.critical ? ' · Abteilungswechsel ⚠' : ''}</div>
            </div>
            <div className="track"><i style={{width:(count/maxCount*100)+'%'}}/></div>
          </summary>
          {reasons.length > 0 && <div className="reasons">
            {reasons.map((r, i) =>
              <div key={i} className="reason"><div className="who">{r.team}</div>{r.reason}</div>
            )}
          </div>}
        </details>
      )}
    </div>
  </div>;
}

function OptimizationsPanel({submissions}) {
  const withOpt = submissions.filter(s => s.optimization && s.optimization.trim());
  return <div className="panel">
    <div className="panel-head"><span className="panel-num">3</span><div className="panel-label">Optimierungsvorschläge</div></div>
    <div className="opt-grid" style={{marginTop:16}}>
      {withOpt.map(s =>
        <div key={s.id} className="opt-card">
          <div className="who"><i/>{s.teamName}</div>
          <div className="body">{s.optimization}</div>
        </div>
      )}
      {withOpt.length === 0 && <div className="msg" style={{gridColumn:'1 / -1', padding:24}}>Noch keine Vorschläge eingegangen.</div>}
    </div>
  </div>;
}

/* ========== MOUNT ========== */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(function() {
  try {
    var src = document.getElementById('app-src').textContent;
    var out = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
    var s = document.createElement('script');
    s.textContent = out;
    document.body.appendChild(s);
  } catch(e) {
    document.getElementById('root').innerHTML = '<pre style="color:#a8452f;padding:20px;font:13px monospace;white-space:pre-wrap">' + (e.stack || String(e)) + '</pre>';
  }
})();
</script>
